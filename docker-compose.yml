services:
  db:
    image: postgres:17-alpine
    ports:
      - "54321:5432"
    environment:
      POSTGRES_USER: catat
      POSTGRES_PASSWORD: catat
      POSTGRES_DB: catat
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catat"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
